<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiteCDN | Global Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800" x-data="saasDashboard()">
  <!-- SaaS Navigation -->
  <nav class="bg-white shadow">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold text-blue-600">LiteCDN.net</h1>
      <span class="text-sm text-gray-500">Logged in as admin@company.com</span>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="max-w-6xl mx-auto mt-8 px-4">
    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold">Your Websites</h2>
      <button @click="isAdding = !isAdding" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-500">
        + Add New Site
      </button>
    </div>

    <!-- Add Site Panel -->
    <div x-show="isAdding" class="bg-white p-6 rounded shadow mb-6" style="display: none;">
      <h3 class="font-bold text-lg mb-2">Configure a new Domain</h3>
      <div class="flex flex-col gap-4 max-w-lg">
        <div>
          <label class="block text-sm text-gray-600 font-medium">CDN Domain Name (Your Custom Domain)</label>
          <input x-model="newDomain" placeholder="cdn.mysite.com" type="text" class="mt-1 w-full border rounded px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm text-gray-600 font-medium">Origin Source URL (Where your server is)</label>
          <input x-model="newOrigin" placeholder="https://origin.mysite.com" type="url" class="mt-1 w-full border rounded px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button @click="submitSite()" class="bg-green-500 text-white px-4 py-2 rounded shadow hover:bg-green-400 self-start">
          Activate Global Routing
        </button>
      </div>
    </div>

    <!-- Active Sites Table -->
    <div class="bg-white shadow rounded overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">CDN Hostname</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Origin Source</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">DNS Status</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 bg-white">
          <template x-for="site in sites" :key="site.domain">
            <tr>
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-blue-600" x-text="site.domain"></td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 font-mono" x-text="site.origin"></td>
              <td class="px-6 py-4 whitespace-nowrap">
                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                  Active
                </span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                <button @click="deleteSite(site.domain)" class="text-red-500 hover:text-red-700 font-medium">Delete Route</button>
                <div class="text-xs text-gray-400 mt-1">Point CNAME to route.litecdnn.vercel.app</div>
              </td>
            </tr>
          </template>
          <tr x-show="sites.length === 0">
            <td colspan="4" class="px-6 py-8 text-center text-gray-500">No websites configured yet. Click "Add New Site".</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <!-- AlpineJS Logic -->
  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('saasDashboard', () => ({
        isAdding: false,
        newDomain: '',
        newOrigin: '',
        sites: [],

        init() {
          this.fetchSites();
        },

        async fetchSites() {
          try {
            const res = await fetch('/api/sites');
            this.sites = await res.json();
          } catch(e) {
            alert('Failed to load sites');
          }
        },

        async submitSite() {
          if (!this.newDomain || !this.newOrigin) return alert('Fill out both fields');
          
          try {
            const res = await fetch('/api/sites', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ domain: this.newDomain, origin: this.newOrigin })
            });

            if (!res.ok) {
              const err = await res.json();
              throw new Error(err.error || 'Server error');
            }
            
            this.newDomain = '';
            this.newOrigin = '';
            this.isAdding = false;
            this.fetchSites(); // Refresh live data
            
          } catch(e) {
            alert(e.message);
          }
        },

        async deleteSite(domain) {
          if(!confirm(`Are you sure you want to stop accelerating ${domain}?`)) return;
          try {
            await fetch(`/api/sites/${domain}`, { method: 'DELETE' });
            this.fetchSites();
          } catch(e) {
            alert('Failed to delete route');
          }
        }
      }));
    });
  </script>
</body>
</html>
