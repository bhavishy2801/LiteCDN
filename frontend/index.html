<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiteCDN - Dashboard</title>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --green: #22c55e; --red: #ef4444; --text: #e2e8f0; --muted: #94a3b8; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem; }
    h1 { text-align: center; font-size: 2rem; margin-bottom: .25rem; }
    h1 span { color: var(--accent); }
    .subtitle { text-align: center; color: var(--muted); margin-bottom: 2rem; font-size: .95rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; max-width: 960px; margin: 0 auto; }
    .card { background: var(--card); border-radius: 12px; padding: 1.5rem; }
    .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--accent); }
    label { display: block; color: var(--muted); font-size: .85rem; margin-bottom: .3rem; }
    input, select { width: 100%; padding: .55rem .75rem; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: var(--text); font-size: .9rem; margin-bottom: .9rem; }
    button { background: var(--accent); color: #0f172a; font-weight: 700; border: none; padding: .6rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: .95rem; }
    button:hover { opacity: .85; }
    .response-box { background: #0f172a; border-radius: 8px; padding: 1rem; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: .82rem; white-space: pre-wrap; word-break: break-all; max-height: 320px; overflow-y: auto; margin-top: .5rem; }
    .meta { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: .5rem; }
    .badge { font-size: .78rem; padding: .2rem .6rem; border-radius: 999px; font-weight: 600; }
    .badge.hit  { background: #166534; color: #bbf7d0; }
    .badge.miss { background: #7f1d1d; color: #fecaca; }
    .badge.edge { background: #1e3a5f; color: #93c5fd; }
    .log-list { list-style: none; max-height: 300px; overflow-y: auto; }
    .log-list li { padding: .35rem 0; border-bottom: 1px solid #334155; font-size: .82rem; font-family: monospace; }
    .full-width { grid-column: 1 / -1; }
  </style>
</head>
<body>
  <h1>🌐 <span>LiteCDN</span></h1>
  <p class="subtitle">End-to-End Connectivity Dashboard</p>

  <div class="grid">
    <!-- Request Panel -->
    <div class="card">
      <h2>📡 Send Request</h2>
      <label for="path">Resource Path</label>
      <select id="path">
        <option value="content/hello.txt">content/hello.txt</option>
        <option value="content/data.json">content/data.json</option>
        <option value="content/sample.txt">content/sample.txt</option>
        <option value="mock/api">mock/api (dynamic JSON)</option>
      </select>
      <label for="gateway">CDN Gateway</label>
      <input id="gateway" value="http://localhost:3000" />
      <button onclick="sendRequest()">Fetch via CDN</button>
    </div>

    <!-- Response Panel -->
    <div class="card">
      <h2>📨 Response</h2>
      <div class="meta" id="meta"></div>
      <div class="response-box" id="response">Click "Fetch via CDN" to make a request …</div>
    </div>

    <!-- Log Panel -->
    <div class="card full-width">
      <h2>📋 Request Log</h2>
      <ul class="log-list" id="log"></ul>
    </div>
  </div>

  <script>
    const GATEWAY = () => document.getElementById('gateway').value.replace(/\/+$/, '');

    async function sendRequest() {
      const path     = document.getElementById('path').value;
      const url      = `${GATEWAY()}/cdn/${path}`;
      const metaEl   = document.getElementById('meta');
      const respEl   = document.getElementById('response');
      const logEl    = document.getElementById('log');

      respEl.textContent = 'Loading …';
      metaEl.innerHTML   = '';

      try {
        const t0  = performance.now();
        const res = await fetch(url);
        const ms  = (performance.now() - t0).toFixed(1);

        const cacheStatus = res.headers.get('X-Cache')   || '—';
        const edgeId      = res.headers.get('X-Edge-Id') || '—';
        const ct          = res.headers.get('Content-Type') || '';

        // Badges
        metaEl.innerHTML = `
          <span class="badge ${cacheStatus === 'HIT' ? 'hit' : 'miss'}">${cacheStatus}</span>
          <span class="badge edge">${edgeId}</span>
          <span class="badge" style="background:#312e81;color:#c4b5fd">${ms} ms</span>
        `;

        // Body
        const body = ct.includes('json') ? JSON.stringify(await res.json(), null, 2) : await res.text();
        respEl.textContent = body;

        // Log entry
        const li = document.createElement('li');
        li.textContent = `[${new Date().toLocaleTimeString()}] ${cacheStatus.padEnd(4)} | ${edgeId.padEnd(7)} | ${ms.padStart(6)} ms | /${path}`;
        logEl.prepend(li);

      } catch (err) {
        respEl.textContent = `Error: ${err.message}`;
      }
    }
  </script>
</body>
</html>
